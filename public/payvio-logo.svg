<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="mark" x1="40" y1="40" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: rounded square -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect width="200" height="200" rx="44" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!--
    The P+V monogram as a single flowing stroke:
    - Vertical stem (left leg of both P and V)
    - P bowl arcing from top back to midpoint
    - V right diagonal from midpoint to bottom-right
  -->

  <!-- Stem of P (also left stroke of V) -->
  <line
    x1="62" y1="48"
    x2="62" y2="154"
    stroke="url(#mark)"
    stroke-width="16"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- P bowl: curves from stem top, arcs right, returns to stem midpoint -->
  <path
    d="M 62,48 C 62,48 138,44 138,82 C 138,120 62,116 62,116"
    stroke="url(#mark)"
    stroke-width="16"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- V right diagonal: from stem midpoint down to bottom-right -->
  <line
    x1="62" y1="116"
    x2="144" y2="154"
    stroke="url(#mark)"
    stroke-width="16"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- Small dot accent at the bottom-right tip -->
  <circle cx="144" cy="154" r="6" fill="white" opacity="0.6"/>
</svg>
