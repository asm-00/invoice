<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="96" y1="0" x2="420" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect width="80" height="80" rx="18" fill="url(#bg2)"/>
  <rect width="80" height="80" rx="18" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- P+V mark (scaled to 80x80) -->
  <!-- Stem -->
  <line x1="24" y1="18" x2="24" y2="62" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- P bowl -->
  <path d="M 24,18 C 24,18 56,17 56,32 C 56,47 24,46 24,46"
    stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- V right leg -->
  <line x1="24" y1="46" x2="58" y2="62" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Accent dot -->
  <circle cx="58" cy="62" r="2.5" fill="white" opacity="0.6"/>

  <!-- Wordmark text -->
  <text
    x="104"
    y="54"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="42"
    font-weight="700"
    letter-spacing="-2"
    fill="url(#textgrad)"
  >Payvio</text>
</svg>
